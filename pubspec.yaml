name: finest_mobile
description: Finest - Personal Finance Manager (Mobile)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Local storage
  shared_preferences: ^2.3.0

  # Image picker for avatar
  image_picker: ^1.1.2

  # Icons
  cupertino_icons: ^1.0.8

  # Intl for date formatting
  intl: ^0.20.2

  # UUID
  uuid: ^4.4.0

  # Google Fonts (Montserrat + Poppins scaricati automaticamente)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
